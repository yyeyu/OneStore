services:
  postgres:
    image: postgres:18-alpine
    command: ["postgres", "-p", "5433"]
    environment:
      POSTGRES_DB: onestore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Default local DB contour: host 127.0.0.1:5433 -> container 5433
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onestore -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ONESTORE_APP_NAME: OneStore
      ONESTORE_ENVIRONMENT: docker
      ONESTORE_DEBUG: "false"
      ONESTORE_HOST: 0.0.0.0
      ONESTORE_PORT: "8000"
      ONESTORE_LOG_LEVEL: INFO
      # The app always connects through a full DATABASE_URL DSN.
      ONESTORE_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5433/onestore
      ONESTORE_DB_ECHO: "false"
      ONESTORE_DB_POOL_PRE_PING: "true"
    ports:
      - "8000:8000"
    command: ["python", "-m", "app.main", "serve", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  postgres_data:
